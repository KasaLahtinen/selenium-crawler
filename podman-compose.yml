version: '3.8'

services:
  selenium:
    image: docker.io/selenium/standalone-chromium:latest
    shm_size: 2gb
    ports:
      - "4444:4444"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Containerfile.api
    env_file: .env
    environment:
      - SELENIUM_URL=http://selenium:4444/wd/hub
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      selenium:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Containerfile.bot
    env_file: .env
    environment:
      - CRAWLER_API_URL=http://api:8000/resolve
    volumes:
      - ./Gemini-IRC-bot/config.yaml:/app/Gemini-IRC-bot/config.yaml:ro
      - bot-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import psutil; import sys; sys.exit(0 if any('bot.py' in p.cmdline() for p in psutil.process_iter(['cmdline'])) else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: Containerfile.bot
    command: ["python", "telegram_bot.py"]
    env_file: .env
    environment:
      - CRAWLER_API_URL=http://api:8000/resolve
    volumes:
      - ./Gemini-IRC-bot/config.yaml:/app/Gemini-IRC-bot/config.yaml:ro
      - bot-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import psutil; import sys; sys.exit(0 if any('telegram_bot.py' in p.cmdline() for p in psutil.process_iter(['cmdline'])) else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bot-data:
